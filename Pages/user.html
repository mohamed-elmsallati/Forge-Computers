<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Welcome to Forge</title>
        <link rel="stylesheet" href="../style.css" />
        <link rel="icon" href="../public/favicon.svg" />
    </head>
    <body style="padding: 100px; text-align: center">
        <h1 id="welcome-message">Hello, <span id="user-display">...</span>!</h1>
        <p>Welcome back to your dashboard.</p>
        <a href="../index.html">Return to Home</a>

        <script>
            const username = localStorage.getItem("forge_username");

            if (username) {
                document.getElementById("user-display").textContent = username;
            } else {
                document.getElementById("user-display").textContent = "Guest";
            }
        </script>
    </body>
</html>
