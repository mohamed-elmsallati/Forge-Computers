<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Forge — Cart</title>
        <link rel="stylesheet" href="/style.css" type="text/css" />
        <link rel="stylesheet" href="/Pages/style.css" type="text/css" />
        <link rel="icon" href="/public/favicon.svg" />
    </head>
    <body>
        <header>
            <div class="container nav">
                <a href="/index.html" class="logo">
                    <span class="logo-mark"></span>
                    FORGE
                </a>
                <nav class="nav-links">
                    <a href="/index.html">Home</a>
                    <a href="/Pages/shop.html">Products</a>
                    <a href="/Pages/signin.html">Sign In</a>
                    <a href="/Pages/about.html">About Us</a>
                </nav>
                <div class="nav-actions">
                    <a href="/Pages/cart.html" class="cart-btn" style="color:#ffffff">Cart · <span class="cart-count">0</span></a>
                </div>
            </div>
        </header>

        <main class="container">
            <section class="section">
                <div class="section-head">
                    <h1>Your cart</h1>
                    <p class="cart-message">Loading cart details...</p>
                </div>
                <div class="cart-summary">
                    <p class="cart-items">Your cart is empty.</p>
                    <ul class="cart-items-list"></ul>
                    <div class="cart-total-row">
                        <span>Total cost</span>
                        <span class="cart-total-amount">$0.00</span>
                    </div>
                </div>
                <div class="cart-actions">
                    <a href="/Pages/shop.html" class="btn-secondary">Continue shopping</a>
                    <button class="btn-primary clear-cart-btn">Clear cart</button>
                </div>
                <div class="checkout-section">
                    <h2>Payment method</h2>
                    <div class="payment-methods">
                        <label class="payment-option">
                            <input type="radio" name="paymentMethod" value="card" checked />
                            Credit / Debit Card
                        </label>
                        <label class="payment-option">
                            <input type="radio" name="paymentMethod" value="paypal" />
                            PayPal
                        </label>
                        <label class="payment-option">
                            <input type="radio" name="paymentMethod" value="apple" />
                            Apple Pay
                        </label>
                    </div>
                    <button class="btn-primary checkout-btn">Proceed to payment</button>
                </div>
            </section>
        </main>

        <script src="/src/script.js?v=2"></script>
    </body>
</html>
