<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FORGE Sign In/Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css" type="text/css">
    <link rel="stylesheet" href="/style.css" type="text/css">
    <link rel="icon" href="/public/favicon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <header class="first">
        <h1>WELCOME TO <span class="header-forge">FORGE</span></h1>
    </header>


<div class="login-container">

    <div class="form-section">
        <div class="form-container">
            <h2 class="signin">Sign In</h2>
            <form id="signin-form" action="user.html" method="get">

                <div class="input-group">
                    <label for="username" class="form-label">E-mail Address</label>
                    <input type="text" id="username" name="username" placeholder="Enter your mail" required>
                </div>

                <div class="input-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <div class="hero-cta">
                    <button class="btn-primary-1">Sign In</button>
                </div>

                </form>
        </div>
    </div>

    <div class="image-section">
        <div class="image-wrapper">
            <img src="/public/signin.jpg" alt="Keyboard" class="side-image">
        </div>
    </div>

</div>


    <div class="social-login-container">

    <div class="social-text-wrapper">
        <p class="social-text">Or you can join with</p>
        <span class="text-separator">or</span>
        <a href= "/index.html" class="ghost-link">continue without signing in</a>
    </div>

    <div class="social-icons-row">
        <button type="button" class="social-btn google-btn" aria-label="Sign in with Google">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.85z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.85c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
        </button>

        <button type="button" class="social-btn facebook-btn" aria-label="Sign in with Facebook">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                <path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.57 6 13.5 6H16v3h-2c-.55 0-1 .45-1 1v2h3v3h-3v6.95c4.56-.93 8-4.96 8-9.75z"/>
            </svg>
        </button>

        <button type="button" class="social-btn apple-btn" aria-label="Sign in with Apple">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.22.67-2.94 1.51-.64.73-1.2 1.87-1.05 2.98 1.12.09 2.27-.56 3-1.43z"/>
            </svg>
        </button>
    </div>
</div>
</div>

<script src="/src/script.js?v=2"></script>
</body>

</html>
